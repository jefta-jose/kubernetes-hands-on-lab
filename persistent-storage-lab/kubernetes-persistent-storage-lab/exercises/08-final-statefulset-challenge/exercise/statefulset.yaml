apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: counter
  namespace: pv-lab-08
spec:
  serviceName: counter
  replicas: 1
  selector:
    matchLabels:
      app: counter
  template:
    metadata:
      labels:
        app: counter
    spec:
      containers:
        - name: counter
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              file="/data/start-count"
              if [ ! -f "$file" ]; then
                echo 0 > "$file"
              fi
              count="$(cat "$file")"
              count=$((count + 1))
              echo "$count" > "$file"
              echo "pod=$HOSTNAME starts=$count" > /data/status.txt
              sleep 3600
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: pv-lab-final
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
