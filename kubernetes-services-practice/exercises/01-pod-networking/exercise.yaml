apiVersion: v1
kind: Namespace
metadata:
  name: service-lab-pods
---
apiVersion: v1
kind: Pod
metadata:
  name: echo-server
  namespace: service-lab-pods
  labels:
    app: echo
spec:
  containers:
    - name: server
      image: hashicorp/http-echo:1.0.0
      args:
        - "-listen=:5678"
        - "-text=hello-from-pod"
      ports:
        - name: http
          containerPort: 5678
---
apiVersion: v1
kind: Pod
metadata:
  name: network-client
  namespace: service-lab-pods
spec:
  containers:
    - name: client
      image: curlimages/curl:8.10.1
      command: ["sh", "-c", "sleep 3600"]
