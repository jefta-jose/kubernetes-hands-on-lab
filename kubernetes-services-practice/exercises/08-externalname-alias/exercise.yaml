apiVersion: v1
kind: Namespace
metadata:
  name: service-lab-alias
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: service-lab-alias
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:5678"
            - "-text=inventory-backend"
          ports:
            - name: http
              containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: service-lab-alias
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  namespace: service-lab-alias
spec:
  type: ExternalName
  externalName: backend.service-lab-alias.svc.cluster.local
---
apiVersion: v1
kind: Pod
metadata:
  name: alias-client
  namespace: service-lab-alias
spec:
  containers:
    - name: client
      image: busybox:1.36.1
      command: ["sh", "-c", "sleep 3600"]
