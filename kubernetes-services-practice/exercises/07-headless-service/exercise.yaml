apiVersion: v1
kind: Namespace
metadata:
  name: service-lab-headless
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: peer-api
  namespace: service-lab-headless
spec:
  replicas: 3
  selector:
    matchLabels:
      app: peer-api
  template:
    metadata:
      labels:
        app: peer-api
    spec:
      containers:
        - name: server
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:5678"
            - "-text=peer-api"
          ports:
            - name: http
              containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: peer-api
  namespace: service-lab-headless
spec:
  clusterIP: None
  selector:
    app: peer-api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Pod
metadata:
  name: dns-client
  namespace: service-lab-headless
spec:
  containers:
    - name: client
      image: curlimages/curl:8.10.1
      command: ["sh", "-c", "sleep 3600"]