apiVersion: v1
kind: Namespace
metadata:
  name: service-lab-clusterip
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quote
  namespace: service-lab-clusterip
spec:
  replicas: 3
  selector:
    matchLabels:
      app: quote
  template:
    metadata:
      labels:
        app: quote
    spec:
      containers:
        - name: quote
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:5678"
            - "-text=quote-service"
          ports:
            - name: http
              containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: quote
  namespace: service-lab-clusterip
spec:
  selector:
    app: quote
  ports:
    - name: http
      port: 80
      targetPort: 5678
---
# so actually the pod is going to hit curl the svc which will in turn
# route traffic to the deployment replicas
apiVersion: v1
kind: Pod
metadata:
  name: service-client
  namespace: service-lab-clusterip
spec:
  containers:
    - name: client
      image: curlimages/curl:8.10.1
      command: ["sh", "-c", "sleep 3600"]
