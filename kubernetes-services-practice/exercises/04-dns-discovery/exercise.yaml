apiVersion: v1
kind: Namespace
metadata:
  name: service-lab-dns
---
apiVersion: v1
kind: Namespace
metadata:
  name: service-lab-dns-client
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: service-lab-dns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
        - name: catalog
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:5678"
            - "-text=catalog-v1"
          ports:
            - name: http
              containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: ________
  namespace: ________
spec:
  selector:
    app: catalog
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Pod
metadata:
  name: dns-client
  namespace: service-lab-dns-client
spec:
  containers:
    - name: client
      image: busybox:1.36.1
      command:
        - sh
        - -c
        - "echo DNS target: ________; sleep 3600"
