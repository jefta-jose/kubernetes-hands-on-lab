apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-404
  namespace: ingress-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: custom-404
  template:
    metadata:
      labels:
        app: custom-404
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          command:
            - /bin/sh
            - -c
            - |
              cat >/etc/nginx/conf.d/default.conf <<'EOF'
              server {
                listen 8080;
                default_type text/plain;
                location / {
                  return 404 "Custom Ingress Lab 404: no rule matched this request.\n";
                }
              }
              EOF
              exec nginx -g 'daemon off;'
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: custom-404
  namespace: ingress-lab
spec:
  type: ClusterIP
  selector:
    app: custom-404
  ports:
    - name: http
      port: 80
      targetPort: http
