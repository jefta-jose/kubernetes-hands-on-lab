apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ingress-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          command:
            - /bin/sh
            - -c
            - |
              printf '<h1>Frontend Service</h1><p>Pod: %s</p>\n' "$HOSTNAME" \
                > /usr/share/nginx/html/index.html
              exec nginx -g 'daemon off;'
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ingress-lab
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quote-api
  namespace: ingress-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quote-api
  template:
    metadata:
      labels:
        app: quote-api
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          command:
            - /bin/sh
            - -c
            - |
              cat >/etc/nginx/conf.d/default.conf <<'EOF'
              server {
                listen 80;
                root /usr/share/nginx/html;
                location / {
                  try_files $uri /index.html;
                }
              }
              EOF
              printf '<h1>Quote API</h1><p>Pod: %s</p><p>Path is preserved by Ingress.</p>\n' "$HOSTNAME" \
                > /usr/share/nginx/html/index.html
              exec nginx -g 'daemon off;'
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: quote-api
  namespace: ingress-lab
spec:
  type: ClusterIP
  selector:
    app: quote-api
  ports:
    - name: http
      port: 80
      targetPort: http
---
