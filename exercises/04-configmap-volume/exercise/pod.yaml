apiVersion: v1
kind: Pod
metadata:
  name: configmap-volume-demo
  namespace: volumes-lab
spec:
  volumes:
    - name: config
      configMap:
        name: web-config
        items:
          - key: message.txt
            path: message.txt
  containers:
    - name: reader
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          while true; do
            printf 'Current value: '
            cat /config/message.txt
            sleep 5
          done
      volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
