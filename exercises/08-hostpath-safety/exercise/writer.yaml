apiVersion: v1
kind: Pod
metadata:
  name: hostpath-writer
  namespace: volumes-lab
spec:
  volumes:
    - name: node-data
      hostPath:
        # A hostPath must be an absolute path,
        path: /tmp/kubernetes-volumes-lab
        type: DirectoryOrCreate
  containers:
    - name: writer
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Written by ${HOSTNAME} at $(date)" > /host-data/marker.txt
          sleep 3600
      volumeMounts:
        - name: node-data
          mountPath: /host-data
