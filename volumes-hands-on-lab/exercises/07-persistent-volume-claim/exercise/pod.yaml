apiVersion: v1
kind: Pod
metadata:
  name: pvc-writer
  namespace: volumes-lab
spec:
  volumes:
    - name: data
      ________:
        claimName: ________
  containers:
    - name: counter
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          current="$(cat /data/counter.txt 2>/dev/null || echo 0)"
          while true; do
            current=$((current + 1))
            echo "${current}" > /data/counter.txt
            echo "persistent-counter=${current}"
            sleep 3
          done
      volumeMounts:
        - name: data
          mountPath: ________
