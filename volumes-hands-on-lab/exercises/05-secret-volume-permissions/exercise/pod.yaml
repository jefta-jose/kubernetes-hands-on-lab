apiVersion: v1
kind: Pod
metadata:
  name: secret-volume-demo
  namespace: volumes-lab
spec:
  # This tells Kubernetes that mounted volume files should be accessible 
  # through filesystem group 101. Kubernetes applies fsGroup at the Pod level
  # because volumes belong to the Pod, not to one individual container.
  securityContext:
    fsGroup: 101
  volumes:
    - name: credentials
      secret:
        secretName: application-credentials
        # defaultMode controls permissions inside the volume
        # it expects Unix permission bits, not a Boolean or description. Use:
        # defaultMode: 0440
          # 0440 means:
          # Owner:  read
          # Group:  read
          # Others: no access
        defaultMode: 0440
  containers:
    - name: reader
      image: busybox:1.36
      securityContext:
        # matches the files system group with read permissions to the secret
        runAsUser: 101
        runAsGroup: 101
        runAsNonRoot: true
      command:
        - sh
        - -c
        - |
          echo "username=$(cat /credentials/username)"
          echo "password file is readable"
          sleep 3600
      volumeMounts:
        - name: credentials
          mountPath: /credentials
          readOnly: true
