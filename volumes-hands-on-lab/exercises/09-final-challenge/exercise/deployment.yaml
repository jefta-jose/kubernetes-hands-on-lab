apiVersion: apps/v1
kind: Deployment
metadata:
  name: volume-lab-web
  namespace: volumes-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: volume-lab-web
  template:
    metadata:
      labels:
        app: volume-lab-web
    spec:
      securityContext:
        fsGroup: 2000

      volumes:
        - name: runtime-context
          projected:
            sources:
              - configMap:
                  name: config-map-volume
                  items:
                    - key: title
                      path: title
                    - key: message
                      path: message
              - secret:
                  name: secret-volume
                  items:
                    - key: display-user
                      path: display-user
              - downwardAPI:
                  items:
                    - path: pod-name
                      fieldRef:
                        fieldPath: metadata.name
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace

        - name: site
          emptyDir: {}

        - name: audit
          persistentVolumeClaim:
            claimName: volume-lab-audit

      initContainers:
        - name: page-builder
          image: busybox:1.36
          securityContext:
            runAsUser: 1000
            runAsGroup: 2000
            runAsNonRoot: true
          command:
            - sh
            - -c
            - |
              cat > /site/index.html <<EOF
              <!doctype html>
              <html>
                <head><title>$(cat /context/title)</title></head>
                <body>
                  <h1>$(cat /context/title)</h1>
                  <p>$(cat /context/message)</p>
                  <ul>
                    <li>User: $(cat /context/display-user)</li>
                    <li>Pod: $(cat /context/pod-name)</li>
                    <li>Namespace: $(cat /context/namespace)</li>
                  </ul>
                </body>
              </html>
              EOF
          volumeMounts:
            - name: runtime-context
              mountPath: /context
              readOnly: true
            - name: site
              mountPath: /site

      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: site
              mountPath: /usr/share/nginx/html
              readOnly: true

        - name: audit-writer
          image: busybox:1.36
          securityContext:
            runAsUser: 1000
            runAsGroup: 2000
            runAsNonRoot: true
          command:
            - sh
            - -c
            - |
              while true; do
                echo "$(date -Iseconds) pod=$(cat /context/pod-name)" >> /audit/events.log
                sleep 10
              done
          volumeMounts:
            - name: runtime-context
              mountPath: /context
              readOnly: true
            - name: audit
              mountPath: /audit
